# Saturn Production Docker Compose Configuration
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:17
    restart: unless-stopped
    # Restrict Postgres internal memory structures for low-resource environments
    command: >
      postgres
      -c max_connections=15
      -c shared_buffers=32MB
      -c work_mem=2MB
      -c maintenance_work_mem=8MB
      -c effective_cache_size=64MB
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-saturn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saturn}
      POSTGRES_DB: ${POSTGRES_DB:-saturn}
    # Database is private to the Docker network in production
    expose:
      - "5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-saturn} -d $${POSTGRES_DB:-saturn}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  migrate:
    image: ${SATURN_IMAGE:-saturn:latest}
    restart: "no"
    command: ["saturn", "migrate", "up"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      SATURN_DB_HOST: db
      SATURN_DB_PORT: "5432"
      SATURN_DB_USER: ${POSTGRES_USER:-saturn}
      SATURN_DB_PASSWORD: ${POSTGRES_PASSWORD:-saturn}
      SATURN_DB_NAME: ${POSTGRES_DB:-saturn}

  saturn:
    image: ${SATURN_IMAGE:-saturn:latest}
    restart: unless-stopped
    # With Cloudflare Tunnel, we do not need to expose port 80 to the public host
    expose:
      - "8080"
    # ports:
    #   - "80:8080" # Uncomment only if bypassing Tunnel (Option B direct IP)
    environment:
      SATURN_DB_HOST: db
      SATURN_DB_PORT: "5432"
      SATURN_DB_USER: ${POSTGRES_USER:-saturn}
      SATURN_DB_PASSWORD: ${POSTGRES_PASSWORD:-saturn}
      SATURN_DB_NAME: ${POSTGRES_DB:-saturn}
      SATURN_GATEWAY_ADDR: ":8080"
      SATURN_LOG_LEVEL: info
      SATURN_LOG_FORMAT: json
      SATURN_SWAGGER_ENABLED: false # Disabled swagger docs in prod for security
      # Limit Go runtime memory footprint to trigger garbage collection early
      GOMEMLIMIT: 128MiB
      SATURN_GATEWAY_COOKIE_SECURE: "true"
    volumes:
       - saturn-data:/data
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 192M

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - saturn

volumes:
  db-data:
  saturn-data:
