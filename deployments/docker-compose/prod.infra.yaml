---
name: saturn-infra

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    networks:
      - saturn-network
    ports:
      - "9000:9000"
    deploy:
      resources:
        limits:
          memory: 128M

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: always
    volumes:
      - kuma-data:/app/data
    networks:
      - saturn-network
    ports:
      - "3001:3001"
    deploy:
      resources:
        limits:
          memory: 128M

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - saturn-network
    deploy:
      resources:
        limits:
          memory: 64M

networks:
  saturn-network:
    name: saturn-network
    external: true

volumes:
  portainer-data:
  kuma-data:
