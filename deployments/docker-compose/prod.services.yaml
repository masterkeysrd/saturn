---
name: saturn-services

services:
  db:
    image: postgres:17
    restart: unless-stopped
    command: >
      postgres
      -c max_connections=15
      -c shared_buffers=32MB
      -c work_mem=2MB
      -c maintenance_work_mem=8MB
      -c effective_cache_size=64MB
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-saturn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saturn}
      POSTGRES_DB: ${POSTGRES_DB:-saturn}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - saturn-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-saturn} -d $${POSTGRES_DB:-saturn}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  pgweb:
    image: sosedoff/pgweb:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      PGWEB_DATABASE_URL: "postgres://${POSTGRES_USER:-saturn}:${POSTGRES_PASSWORD:-saturn}@db:5432/${POSTGRES_DB:-saturn}?sslmode=disable"
    networks:
      - saturn-network
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M

networks:
  saturn-network:
    name: saturn-network
    external: true

volumes:
  db-data:
