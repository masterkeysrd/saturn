syntax = "proto3";

package saturn.finance.v1;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "saturn/platform/scheduler/v1/options.proto";

option go_package = "github.com/masterkeysrd/saturn/apis/saturn/finance/v1;financev1";

// Finance provides budgeting and currency management operations for a workspace.
service Finance {
  // ConfigureFinance sets up the default base currency for a workspace.
  rpc ConfigureFinance(ConfigureFinanceRequest) returns (FinanceSettings) {
    option (google.api.http) = {
      post: "/v1/spaces/{space_id}/finance/settings"
      body: "*"
    };
  }

  // GetFinanceSettings retrieves the finance settings for a workspace.
  rpc GetFinanceSettings(GetFinanceSettingsRequest) returns (FinanceSettings) {
    option (google.api.http) = {get: "/v1/spaces/{space_id}/finance/settings"};
  }

  // CreateBudget creates a new budget template in a workspace.
  rpc CreateBudget(CreateBudgetRequest) returns (Budget) {
    option (google.api.http) = {
      post: "/v1/spaces/{space_id}/finance/budgets"
      body: "*"
    };
  }

  // UpdateBudget updates a budget template.
  rpc UpdateBudget(UpdateBudgetRequest) returns (Budget) {
    option (google.api.http) = {
      patch: "/v1/spaces/{space_id}/finance/budgets/{id}"
      body: "*"
    };
  }

  // DeleteBudget deletes a budget template.
  rpc DeleteBudget(DeleteBudgetRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/v1/spaces/{space_id}/finance/budgets/{id}"};
  }

  // ListBudgets lists all budget templates in a workspace.
  rpc ListBudgets(ListBudgetsRequest) returns (ListBudgetsResponse) {
    option (google.api.http) = {get: "/v1/spaces/{space_id}/finance/budgets"};
  }

  // GetBudgetPeriod retrieves or generates the budget period for a specific date.
  rpc GetBudgetPeriod(GetBudgetPeriodRequest) returns (BudgetPeriod) {
    option (google.api.http) = {get: "/v1/spaces/{space_id}/finance/budgets/{budget_id}/period"};
  }

  // CreateExchangeRate registers a new daily rate conversion rule.
  rpc CreateExchangeRate(CreateExchangeRateRequest) returns (ExchangeRate) {
    option (google.api.http) = {
      post: "/v1/spaces/{space_id}/finance/rates"
      body: "*"
    };
  }

  // ListExchangeRates lists all exchange rate rules in a workspace.
  rpc ListExchangeRates(ListExchangeRatesRequest) returns (ListExchangeRatesResponse) {
    option (google.api.http) = {get: "/v1/spaces/{space_id}/finance/rates"};
  }

  // DeleteExchangeRate deletes a specific daily rate conversion rule.
  rpc DeleteExchangeRate(DeleteExchangeRateRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/v1/spaces/{space_id}/finance/rates"};
  }

  // CreateExpense logs a new expense transaction.
  rpc CreateExpense(CreateExpenseRequest) returns (Transaction) {
    option (google.api.http) = {
      post: "/v1/spaces/{space_id}/finance/expenses"
      body: "*"
    };
  }

  // UpdateExpense modifies an existing expense.
  rpc UpdateExpense(UpdateExpenseRequest) returns (Transaction) {
    option (google.api.http) = {
      put: "/v1/spaces/{space_id}/finance/expenses/{id}"
      body: "*"
    };
  }

  // DeleteTransaction deletes any type of transaction.
  rpc DeleteTransaction(DeleteTransactionRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/v1/spaces/{space_id}/finance/transactions/{id}"};
  }

  // ListTransactions lists paginated transactions for a workspace.
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse) {
    option (google.api.http) = {get: "/v1/spaces/{space_id}/finance/transactions"};
  }

  // GetInsights aggregates workspace spent insights and statistics.
  rpc GetInsights(GetInsightsRequest) returns (GetInsightsResponse) {
    option (google.api.http) = {get: "/v1/spaces/{space_id}/finance/insights"};
  }
}

enum RecurrenceInterval {
  RECURRENCE_INTERVAL_UNSPECIFIED = 0;
  INTERVAL_WEEKLY = 1;
  INTERVAL_MONTHLY = 2;
  INTERVAL_YEARLY = 3;
}

// FinanceSettings represents workspace configuration.
message FinanceSettings {
  string space_id = 1;
  string base_currency = 2;
  google.protobuf.Timestamp create_time = 3;
  google.protobuf.Timestamp update_time = 4;
}

// Budget represents a budget template definition.
message Budget {
  string id = 1;
  string space_id = 2;
  string name = 3;
  int64 limit_amount = 4;
  string currency = 5;
  RecurrenceInterval interval = 6;
  bool is_active = 7;
  google.protobuf.Timestamp create_time = 8;
  google.protobuf.Timestamp update_time = 9;
  string icon = 10;
  string color = 11;
}

// BudgetPeriod represents an active instantiation of a budget.
message BudgetPeriod {
  string id = 1;
  string budget_id = 2;
  string space_id = 3;
  google.protobuf.Timestamp start_date = 4;
  google.protobuf.Timestamp end_date = 5;
  int64 limit_amount = 6;
  string currency = 7;
  string base_currency = 8;
  double exchange_rate_to_base = 9;
  google.protobuf.Timestamp create_time = 10;
  google.protobuf.Timestamp update_time = 11;
  int64 spent_amount = 12;
  int64 spent_in_base = 13;
}

// ConfigureFinanceRequest contains fields for initial setup.
message ConfigureFinanceRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string base_currency = 2 [(google.api.field_behavior) = REQUIRED];
}

// GetFinanceSettingsRequest contains fields to fetch config.
message GetFinanceSettingsRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
}

// CreateBudgetRequest contains fields to create budget.
message CreateBudgetRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string name = 2 [(google.api.field_behavior) = REQUIRED];
  int64 limit_amount = 3 [(google.api.field_behavior) = REQUIRED];
  string currency = 4 [(google.api.field_behavior) = REQUIRED];
  RecurrenceInterval interval = 5 [(google.api.field_behavior) = REQUIRED];
  string icon = 6;
  string color = 7;
}

enum LimitPropagation {
  LIMIT_PROPAGATION_UNSPECIFIED = 0;
  LIMIT_PROPAGATION_CURRENT_PERIOD = 1;
  LIMIT_PROPAGATION_NEXT_PERIODS_ONLY = 2;
}

// UpdateBudgetRequest contains update rules.
message UpdateBudgetRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string id = 2 [(google.api.field_behavior) = REQUIRED];
  string name = 3;
  int64 limit_amount = 4;
  string currency = 5;
  RecurrenceInterval interval = 6;
  bool is_active = 7;
  LimitPropagation propagation = 8;
  string icon = 9;
  string color = 10;
}

// DeleteBudgetRequest contains deletion target.
message DeleteBudgetRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string id = 2 [(google.api.field_behavior) = REQUIRED];
}

// ListBudgetsRequest contains listing parameters.
message ListBudgetsRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  int32 page_size = 2;
  string page_token = 3;
}

// ListBudgetsResponse contains paginated budgets.
message ListBudgetsResponse {
  repeated Budget budgets = 1;
  string next_page_token = 2;
}

// GetBudgetPeriodRequest retrieves period for date.
message GetBudgetPeriodRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string budget_id = 2 [(google.api.field_behavior) = REQUIRED];
  google.protobuf.Timestamp date = 3; // Timestamp for calculation, defaults to current time if omitted
}

// ExchangeRate represents a daily rate record.
message ExchangeRate {
  string space_id = 1;
  string from_currency = 2;
  string to_currency = 3;
  double rate = 4;
  google.protobuf.Timestamp rate_date = 5;
  google.protobuf.Timestamp create_time = 6;
}

// CreateExchangeRateRequest registers a daily rate.
message CreateExchangeRateRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string from_currency = 2 [(google.api.field_behavior) = REQUIRED];
  string to_currency = 3 [(google.api.field_behavior) = REQUIRED];
  double rate = 4 [(google.api.field_behavior) = REQUIRED];
  google.protobuf.Timestamp rate_date = 5 [(google.api.field_behavior) = REQUIRED];
}

// ListExchangeRatesRequest lists workspace rates.
message ListExchangeRatesRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  int32 page_size = 2;
  string page_token = 3;
}

// ListExchangeRatesResponse contains paginated rates.
message ListExchangeRatesResponse {
  repeated ExchangeRate exchange_rates = 1;
  string next_page_token = 2;
}

// DeleteExchangeRateRequest contains identifiers for rate deletion.
message DeleteExchangeRateRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string from_currency = 2 [(google.api.field_behavior) = REQUIRED];
  string to_currency = 3 [(google.api.field_behavior) = REQUIRED];
  google.protobuf.Timestamp rate_date = 4 [(google.api.field_behavior) = REQUIRED];
}

enum TransactionType {
  TRANSACTION_TYPE_UNSPECIFIED = 0;
  EXPENSE = 1;
  INCOME = 2;
}

message Transaction {
  string id = 1;
  string space_id = 2;
  TransactionType type = 3;
  string budget_id = 4;
  string period_id = 5;
  int64 amount = 6;
  string currency = 7;
  int64 amount_in_base = 8;
  string description = 9;
  google.protobuf.Timestamp transaction_date = 10;
  google.protobuf.Timestamp create_time = 11;
  google.protobuf.Timestamp update_time = 12;
  google.protobuf.Timestamp effective_date = 13;
}

message ExpenseInput {
  string budget_id = 1 [(google.api.field_behavior) = REQUIRED];
  int64 amount = 2 [(google.api.field_behavior) = REQUIRED];
  string currency = 3 [(google.api.field_behavior) = REQUIRED];
  string description = 4;
  google.protobuf.Timestamp transaction_date = 5;
  google.protobuf.Timestamp effective_date = 6;
}

message CreateExpenseRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  ExpenseInput expense = 2 [(google.api.field_behavior) = REQUIRED];
}

message UpdateExpenseRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string id = 2 [(google.api.field_behavior) = REQUIRED];
  ExpenseInput expense = 3 [(google.api.field_behavior) = REQUIRED];
}

message DeleteTransactionRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string id = 2 [(google.api.field_behavior) = REQUIRED];
}

message ListTransactionsRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string budget_id = 2;
  TransactionType type = 3;
  int32 page_size = 4;
  string page_token = 5;
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
  string next_page_token = 2;
}

enum InsightGranularity {
  INSIGHT_GRANULARITY_UNSPECIFIED = 0;
  DAILY = 1;
  WEEKLY = 2;
  MONTHLY = 3;
  YEARLY = 4;
}

message GetInsightsRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  InsightGranularity granularity = 2;
  google.protobuf.Timestamp start_date = 3;
  google.protobuf.Timestamp end_date = 4;
}

message GetInsightsResponse {
  SpentInsights spent = 1;
}

message SpentInsights {
  int64 total_limit = 1;
  int64 total_spent = 2;
  int64 remaining_budget = 3;
  double burn_rate = 4;

  message BudgetContribution {
    string budget_id = 1;
    string budget_name = 2;
    string budget_color = 3;
    int64 amount_in_base = 4;
    int64 amount_in_local = 5;
    string local_currency = 6;
    double contribution_percentage = 7;
  }

  message TrendDataPoint {
    string label = 1;
    string start_date = 2;
    int64 amount_in_base = 3;
    int32 transaction_count = 4;
    repeated BudgetContribution contributions = 5;
  }

  repeated TrendDataPoint trend = 5;

  message BudgetUsage {
    string budget_id = 1;
    string budget_name = 2;
    string budget_color = 3;
    string budget_icon = 4;
    int64 limit = 5;
    int64 spent = 6;
    int64 spent_in_base = 7;
    double usage_percentage = 8;
  }

  repeated BudgetUsage distributions = 6;

  message HighValueExpense {
    string transaction_id = 1;
    string description = 2;
    int64 amount = 3;
    string currency = 4;
    int64 amount_in_base = 5;
    string budget_name = 6;
    google.protobuf.Timestamp transaction_date = 7;
    google.protobuf.Timestamp effective_date = 8;
  }

  repeated HighValueExpense top_expenses = 7;
}

message GenerateScheduledPaymentsPayload {
  option (saturn.platform.scheduler.v1.job_type) = "finance.GenerateScheduledPayments";
}
