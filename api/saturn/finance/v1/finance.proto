syntax = "proto3";

package saturn.finance.v1;

import "google/api/annotations.proto";
import "google/api/field_behavior.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "saturn/platform/scheduler/v1/options.proto";

option go_package = "github.com/masterkeysrd/saturn/apis/saturn/finance/v1;financev1";

// Finance provides budgeting and currency management operations for a workspace.
service Finance {
  // ConfigureFinance sets up the default base currency for a workspace.
  rpc ConfigureFinance(ConfigureFinanceRequest) returns (FinanceSettings) {
    option (google.api.http) = {
      post: "/v1/spaces/{space_id}/finance/settings"
      body: "*"
    };
  }

  // GetFinanceSettings retrieves the finance settings for a workspace.
  rpc GetFinanceSettings(GetFinanceSettingsRequest) returns (FinanceSettings) {
    option (google.api.http) = {get: "/v1/spaces/{space_id}/finance/settings"};
  }

  // CreateBudget creates a new budget template in a workspace.
  rpc CreateBudget(CreateBudgetRequest) returns (Budget) {
    option (google.api.http) = {
      post: "/v1/spaces/{space_id}/finance/budgets"
      body: "*"
    };
  }

  // UpdateBudget updates a budget template.
  rpc UpdateBudget(UpdateBudgetRequest) returns (Budget) {
    option (google.api.http) = {
      patch: "/v1/spaces/{space_id}/finance/budgets/{id}"
      body: "*"
    };
  }

  // DeleteBudget deletes a budget template.
  rpc DeleteBudget(DeleteBudgetRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/v1/spaces/{space_id}/finance/budgets/{id}"};
  }

  // ListBudgets lists all budget templates in a workspace.
  rpc ListBudgets(ListBudgetsRequest) returns (ListBudgetsResponse) {
    option (google.api.http) = {get: "/v1/spaces/{space_id}/finance/budgets"};
  }

  // GetBudgetPeriod retrieves or generates the budget period for a specific date.
  rpc GetBudgetPeriod(GetBudgetPeriodRequest) returns (BudgetPeriod) {
    option (google.api.http) = {get: "/v1/spaces/{space_id}/finance/budgets/{budget_id}/period"};
  }

  // CreateExchangeRate registers a new daily rate conversion rule.
  rpc CreateExchangeRate(CreateExchangeRateRequest) returns (ExchangeRate) {
    option (google.api.http) = {
      post: "/v1/spaces/{space_id}/finance/rates"
      body: "*"
    };
  }

  // ListExchangeRates lists all exchange rate rules in a workspace.
  rpc ListExchangeRates(ListExchangeRatesRequest) returns (ListExchangeRatesResponse) {
    option (google.api.http) = {get: "/v1/spaces/{space_id}/finance/rates"};
  }

  // DeleteExchangeRate deletes a specific daily rate conversion rule.
  rpc DeleteExchangeRate(DeleteExchangeRateRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/v1/spaces/{space_id}/finance/rates"};
  }

  // CreateExpense logs a new expense transaction.
  rpc CreateExpense(CreateExpenseRequest) returns (Transaction) {
    option (google.api.http) = {
      post: "/v1/spaces/{space_id}/finance/expenses"
      body: "*"
    };
  }

  // UpdateExpense modifies an existing expense.
  rpc UpdateExpense(UpdateExpenseRequest) returns (Transaction) {
    option (google.api.http) = {
      put: "/v1/spaces/{space_id}/finance/expenses/{id}"
      body: "*"
    };
  }

  // DeleteTransaction deletes any type of transaction.
  rpc DeleteTransaction(DeleteTransactionRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/v1/spaces/{space_id}/finance/transactions/{id}"};
  }

  // ListTransactions lists paginated transactions for a workspace.
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse) {
    option (google.api.http) = {get: "/v1/spaces/{space_id}/finance/transactions"};
  }

  // GetInsights aggregates workspace spent insights and statistics.
  rpc GetInsights(GetInsightsRequest) returns (GetInsightsResponse) {
    option (google.api.http) = {get: "/v1/spaces/{space_id}/finance/insights"};
  }

  // CreateRecurringExpense configures a new recurring expense rule.
  rpc CreateRecurringExpense(CreateRecurringExpenseRequest) returns (RecurringExpense) {
    option (google.api.http) = {
      post: "/v1/spaces/{space_id}/finance/recurring-expenses"
      body: "*"
    };
  }

  // UpdateRecurringExpense modifies an existing recurring expense rule.
  rpc UpdateRecurringExpense(UpdateRecurringExpenseRequest) returns (RecurringExpense) {
    option (google.api.http) = {
      put: "/v1/spaces/{space_id}/finance/recurring-expenses/{id}"
      body: "*"
    };
  }

  // DeleteRecurringExpense deletes a recurring expense rule.
  rpc DeleteRecurringExpense(DeleteRecurringExpenseRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/v1/spaces/{space_id}/finance/recurring-expenses/{id}"};
  }

  // ListRecurringExpenses lists recurring expenses for a workspace.
  rpc ListRecurringExpenses(ListRecurringExpensesRequest) returns (ListRecurringExpensesResponse) {
    option (google.api.http) = {get: "/v1/spaces/{space_id}/finance/recurring-expenses"};
  }

  // ListScheduledPayments lists scheduled payments for a workspace.
  rpc ListScheduledPayments(ListScheduledPaymentsRequest) returns (ListScheduledPaymentsResponse) {
    option (google.api.http) = {get: "/v1/spaces/{space_id}/finance/scheduled-payments"};
  }

  // ConfirmScheduledPayment clears a scheduled payment by promoting it to a permanent transaction.
  rpc ConfirmScheduledPayment(ConfirmScheduledPaymentRequest) returns (Transaction) {
    option (google.api.http) = {
      post: "/v1/spaces/{space_id}/finance/scheduled-payments/{payment_id}/confirm"
      body: "*"
    };
  }

  // CreateBorrowing logs a new personal lent/borrowed debt agreement.
  rpc CreateBorrowing(CreateBorrowingRequest) returns (Borrowing) {
    option (google.api.http) = {
      post: "/v1/spaces/{space_id}/finance/borrowings"
      body: "*"
    };
  }

  // GetBorrowing retrieves a single borrowing record.
  rpc GetBorrowing(GetBorrowingRequest) returns (Borrowing) {
    option (google.api.http) = {get: "/v1/spaces/{space_id}/finance/borrowings/{id}"};
  }

  // ListBorrowings returns borrowings for a space, optionally filtered.
  rpc ListBorrowings(ListBorrowingsRequest) returns (ListBorrowingsResponse) {
    option (google.api.http) = {get: "/v1/spaces/{space_id}/finance/borrowings"};
  }

  // UpdateBorrowing updates basic details of a borrowing record.
  rpc UpdateBorrowing(UpdateBorrowingRequest) returns (Borrowing) {
    option (google.api.http) = {
      put: "/v1/spaces/{space_id}/finance/borrowings/{id}"
      body: "*"
    };
  }

  // DeleteBorrowing removes a borrowing and all its repayments.
  rpc DeleteBorrowing(DeleteBorrowingRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/v1/spaces/{space_id}/finance/borrowings/{id}"};
  }

  // CreateBorrowingRepayment records an installment payment towards a borrowing.
  rpc CreateBorrowingRepayment(CreateBorrowingRepaymentRequest) returns (BorrowingRepayment) {
    option (google.api.http) = {
      post: "/v1/spaces/{space_id}/finance/borrowings/{borrowing_id}/repayments"
      body: "*"
    };
  }

  // ListBorrowingRepayments returns all repayments for a specific borrowing.
  rpc ListBorrowingRepayments(ListBorrowingRepaymentsRequest) returns (ListBorrowingRepaymentsResponse) {
    option (google.api.http) = {get: "/v1/spaces/{space_id}/finance/borrowings/{borrowing_id}/repayments"};
  }

  // DeleteBorrowingRepayment deletes a specific installment and restores the balance.
  rpc DeleteBorrowingRepayment(DeleteBorrowingRepaymentRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/v1/spaces/{space_id}/finance/borrowings/{borrowing_id}/repayments/{id}"};
  }

  // ListCurrencies returns the list of supported currencies.
  rpc ListCurrencies(ListCurrenciesRequest) returns (ListCurrenciesResponse) {
    option (google.api.http) = {get: "/v1/spaces/{space_id}/finance/currencies"};
  }
}

enum RecurrenceInterval {
  RECURRENCE_INTERVAL_UNSPECIFIED = 0;
  INTERVAL_WEEKLY = 1;
  INTERVAL_MONTHLY = 2;
  INTERVAL_YEARLY = 3;
}

// FinanceSettings represents workspace configuration.
message FinanceSettings {
  string space_id = 1;
  string base_currency = 2;
  google.protobuf.Timestamp create_time = 3;
  google.protobuf.Timestamp update_time = 4;
}

// Budget represents a budget template definition.
message Budget {
  string id = 1;
  string space_id = 2;
  string name = 3;
  int64 limit_amount = 4;
  string currency = 5;
  RecurrenceInterval interval = 6;
  bool is_active = 7;
  google.protobuf.Timestamp create_time = 8;
  google.protobuf.Timestamp update_time = 9;
  string icon = 10;
  string color = 11;
}

// BudgetPeriod represents an active instantiation of a budget.
message BudgetPeriod {
  string id = 1;
  string budget_id = 2;
  string space_id = 3;
  google.protobuf.Timestamp start_date = 4;
  google.protobuf.Timestamp end_date = 5;
  int64 limit_amount = 6;
  string currency = 7;
  string base_currency = 8;
  double exchange_rate_to_base = 9;
  google.protobuf.Timestamp create_time = 10;
  google.protobuf.Timestamp update_time = 11;
  int64 spent_amount = 12;
  int64 spent_in_base = 13;
}

// ConfigureFinanceRequest contains fields for initial setup.
message ConfigureFinanceRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string base_currency = 2 [(google.api.field_behavior) = REQUIRED];
}

// GetFinanceSettingsRequest contains fields to fetch config.
message GetFinanceSettingsRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
}

// CreateBudgetRequest contains fields to create budget.
message CreateBudgetRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string name = 2 [(google.api.field_behavior) = REQUIRED];
  int64 limit_amount = 3 [(google.api.field_behavior) = REQUIRED];
  string currency = 4 [(google.api.field_behavior) = REQUIRED];
  RecurrenceInterval interval = 5 [(google.api.field_behavior) = REQUIRED];
  string icon = 6;
  string color = 7;
}

enum LimitPropagation {
  LIMIT_PROPAGATION_UNSPECIFIED = 0;
  LIMIT_PROPAGATION_CURRENT_PERIOD = 1;
  LIMIT_PROPAGATION_NEXT_PERIODS_ONLY = 2;
}

// UpdateBudgetRequest contains update rules.
message UpdateBudgetRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string id = 2 [(google.api.field_behavior) = REQUIRED];
  string name = 3;
  int64 limit_amount = 4;
  string currency = 5;
  RecurrenceInterval interval = 6;
  bool is_active = 7;
  LimitPropagation propagation = 8;
  string icon = 9;
  string color = 10;
}

// DeleteBudgetRequest contains deletion target.
message DeleteBudgetRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string id = 2 [(google.api.field_behavior) = REQUIRED];
}

// ListBudgetsRequest contains listing parameters.
message ListBudgetsRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  int32 page_size = 2;
  string page_token = 3;
}

// ListBudgetsResponse contains paginated budgets.
message ListBudgetsResponse {
  repeated Budget budgets = 1;
  string next_page_token = 2;
}

// GetBudgetPeriodRequest retrieves period for date.
message GetBudgetPeriodRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string budget_id = 2 [(google.api.field_behavior) = REQUIRED];
  google.protobuf.Timestamp date = 3; // Timestamp for calculation, defaults to current time if omitted
}

// ExchangeRate represents a daily rate record.
message ExchangeRate {
  string space_id = 1;
  string from_currency = 2;
  string to_currency = 3;
  double rate = 4;
  google.protobuf.Timestamp rate_date = 5;
  google.protobuf.Timestamp create_time = 6;
}

// CreateExchangeRateRequest registers a daily rate.
message CreateExchangeRateRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string from_currency = 2 [(google.api.field_behavior) = REQUIRED];
  string to_currency = 3 [(google.api.field_behavior) = REQUIRED];
  double rate = 4 [(google.api.field_behavior) = REQUIRED];
  google.protobuf.Timestamp rate_date = 5 [(google.api.field_behavior) = REQUIRED];
}

// ListExchangeRatesRequest lists workspace rates.
message ListExchangeRatesRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  int32 page_size = 2;
  string page_token = 3;
}

// ListExchangeRatesResponse contains paginated rates.
message ListExchangeRatesResponse {
  repeated ExchangeRate exchange_rates = 1;
  string next_page_token = 2;
}

// DeleteExchangeRateRequest contains identifiers for rate deletion.
message DeleteExchangeRateRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string from_currency = 2 [(google.api.field_behavior) = REQUIRED];
  string to_currency = 3 [(google.api.field_behavior) = REQUIRED];
  google.protobuf.Timestamp rate_date = 4 [(google.api.field_behavior) = REQUIRED];
}

enum TransactionType {
  TRANSACTION_TYPE_UNSPECIFIED = 0;
  EXPENSE = 1;
  INCOME = 2;
}

message Transaction {
  string id = 1;
  string space_id = 2;
  TransactionType type = 3;
  string budget_id = 4;
  string period_id = 5;
  int64 amount = 6;
  string currency = 7;
  int64 amount_in_base = 8;
  string description = 9;
  google.protobuf.Timestamp transaction_date = 10;
  google.protobuf.Timestamp create_time = 11;
  google.protobuf.Timestamp update_time = 12;
  google.protobuf.Timestamp effective_date = 13;
  optional string source_type = 14;
  optional string source_id = 15;
}

message ExpenseInput {
  string budget_id = 1 [(google.api.field_behavior) = REQUIRED];
  int64 amount = 2 [(google.api.field_behavior) = REQUIRED];
  string currency = 3 [(google.api.field_behavior) = REQUIRED];
  string description = 4;
  google.protobuf.Timestamp transaction_date = 5;
  google.protobuf.Timestamp effective_date = 6;
}

message CreateExpenseRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  ExpenseInput expense = 2 [(google.api.field_behavior) = REQUIRED];
}

message UpdateExpenseRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string id = 2 [(google.api.field_behavior) = REQUIRED];
  ExpenseInput expense = 3 [(google.api.field_behavior) = REQUIRED];
}

message DeleteTransactionRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string id = 2 [(google.api.field_behavior) = REQUIRED];
}

message ListTransactionsRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string budget_id = 2;
  TransactionType type = 3;
  int32 page_size = 4;
  string page_token = 5;
  optional string source_type = 6;
  optional string source_id = 7;
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
  string next_page_token = 2;
}

enum InsightGranularity {
  INSIGHT_GRANULARITY_UNSPECIFIED = 0;
  DAILY = 1;
  WEEKLY = 2;
  MONTHLY = 3;
  YEARLY = 4;
}

message GetInsightsRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  InsightGranularity granularity = 2;
  google.protobuf.Timestamp start_date = 3;
  google.protobuf.Timestamp end_date = 4;
}

message GetInsightsResponse {
  SpentInsights spent = 1;
}

message SpentInsights {
  int64 total_limit = 1;
  int64 total_spent = 2;
  int64 remaining_budget = 3;
  double burn_rate = 4;

  message BudgetContribution {
    string budget_id = 1;
    string budget_name = 2;
    string budget_color = 3;
    int64 amount_in_base = 4;
    int64 amount_in_local = 5;
    string local_currency = 6;
    double contribution_percentage = 7;
  }

  message TrendDataPoint {
    string label = 1;
    string start_date = 2;
    int64 amount_in_base = 3;
    int32 transaction_count = 4;
    repeated BudgetContribution contributions = 5;
  }

  repeated TrendDataPoint trend = 5;

  message BudgetUsage {
    string budget_id = 1;
    string budget_name = 2;
    string budget_color = 3;
    string budget_icon = 4;
    int64 limit = 5;
    int64 spent = 6;
    int64 spent_in_base = 7;
    double usage_percentage = 8;
  }

  repeated BudgetUsage distributions = 6;

  message HighValueExpense {
    string transaction_id = 1;
    string description = 2;
    int64 amount = 3;
    string currency = 4;
    int64 amount_in_base = 5;
    string budget_name = 6;
    google.protobuf.Timestamp transaction_date = 7;
    google.protobuf.Timestamp effective_date = 8;
  }

  repeated HighValueExpense top_expenses = 7;
}

message GenerateScheduledPaymentsPayload {
  option (saturn.platform.scheduler.v1.job_type) = "finance.GenerateScheduledPayments";
}

message RecurringExpense {
  string id = 1;
  string space_id = 2;
  string budget_id = 3;
  string name = 4;
  int64 amount = 5;
  string currency = 6;
  string interval = 7;
  google.protobuf.Timestamp next_due_date = 8;
  bool is_variable = 9;
  string status = 10;
  int32 grace_period_days = 11;
  google.protobuf.Timestamp create_time = 12;
  google.protobuf.Timestamp update_time = 13;
}

message ScheduledPayment {
  string id = 1;
  string space_id = 2;
  string budget_id = 3;
  string source_type = 4;
  string source_id = 5;
  int64 amount = 6;
  string currency = 7;
  google.protobuf.Timestamp due_date = 8;
  string status = 9;
  bytes metadata = 10;
  google.protobuf.Timestamp create_time = 11;
  google.protobuf.Timestamp update_time = 12;
}

message CreateRecurringExpenseRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string budget_id = 2 [(google.api.field_behavior) = REQUIRED];
  string name = 3 [(google.api.field_behavior) = REQUIRED];
  int64 amount = 4 [(google.api.field_behavior) = REQUIRED];
  string currency = 5 [(google.api.field_behavior) = REQUIRED];
  string interval = 6 [(google.api.field_behavior) = REQUIRED];
  google.protobuf.Timestamp next_due_date = 7 [(google.api.field_behavior) = REQUIRED];
  bool is_variable = 8;
  int32 grace_period_days = 9;
}

message UpdateRecurringExpenseRequest {
  string id = 1 [(google.api.field_behavior) = REQUIRED];
  string space_id = 2 [(google.api.field_behavior) = REQUIRED];
  string budget_id = 3 [(google.api.field_behavior) = REQUIRED];
  string name = 4 [(google.api.field_behavior) = REQUIRED];
  int64 amount = 5 [(google.api.field_behavior) = REQUIRED];
  string currency = 6 [(google.api.field_behavior) = REQUIRED];
  string interval = 7 [(google.api.field_behavior) = REQUIRED];
  google.protobuf.Timestamp next_due_date = 8 [(google.api.field_behavior) = REQUIRED];
  bool is_variable = 9;
  string status = 10 [(google.api.field_behavior) = REQUIRED];
  int32 grace_period_days = 11;
}

message DeleteRecurringExpenseRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string id = 2 [(google.api.field_behavior) = REQUIRED];
}

message ListRecurringExpensesRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string status = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message ListRecurringExpensesResponse {
  repeated RecurringExpense recurring_expenses = 1;
  string next_page_token = 2;
}

message ListScheduledPaymentsRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string status = 2;
  google.protobuf.Timestamp start_date = 3;
  google.protobuf.Timestamp end_date = 4;
  int32 page_size = 5;
  string page_token = 6;
}

message ListScheduledPaymentsResponse {
  repeated ScheduledPayment scheduled_payments = 1;
  string next_page_token = 2;
}

message ConfirmScheduledPaymentRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string payment_id = 2 [(google.api.field_behavior) = REQUIRED];
  google.protobuf.Timestamp transaction_date = 3 [(google.api.field_behavior) = REQUIRED];
  google.protobuf.Timestamp effective_date = 4 [(google.api.field_behavior) = REQUIRED];
  int64 actual_amount = 5 [(google.api.field_behavior) = REQUIRED];
}

enum BorrowingDirection {
  BORROWING_DIRECTION_UNSPECIFIED = 0;
  BORROWING_DIRECTION_BORROWED = 1;
  BORROWING_DIRECTION_LENT = 2;
}

enum BorrowingStatus {
  BORROWING_STATUS_UNSPECIFIED = 0;
  BORROWING_STATUS_ACTIVE = 1;
  BORROWING_STATUS_PAID_OFF = 2;
}

message Borrowing {
  string id = 1;
  string space_id = 2;
  BorrowingDirection direction = 3;
  string counterparty = 4;
  string contact_info = 5;
  int64 total_amount = 6;
  int64 remaining_amount = 7;
  string currency = 8;
  BorrowingStatus status = 9;
  google.protobuf.Timestamp established_at = 10;
  google.protobuf.Timestamp due_at = 11;
  bool create_as_transaction = 12;
  string notes = 13;
  google.protobuf.Timestamp create_time = 14;
  google.protobuf.Timestamp update_time = 15;
}

message BorrowingRepayment {
  string id = 1;
  string borrowing_id = 2;
  string space_id = 3;
  int64 amount = 4;
  google.protobuf.Timestamp payment_date = 5;
  string notes = 6;
  google.protobuf.Timestamp create_time = 7;
  google.protobuf.Timestamp update_time = 8;
}

message BorrowingInput {
  BorrowingDirection direction = 1 [(google.api.field_behavior) = REQUIRED];
  string counterparty = 2 [(google.api.field_behavior) = REQUIRED];
  string contact_info = 3;
  int64 total_amount = 4 [(google.api.field_behavior) = REQUIRED];
  string currency = 5 [(google.api.field_behavior) = REQUIRED];
  google.protobuf.Timestamp established_at = 6 [(google.api.field_behavior) = REQUIRED];
  google.protobuf.Timestamp due_at = 7;
  string notes = 8;
  bool create_as_transaction = 9;
}

message CreateBorrowingRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  BorrowingInput borrowing = 2 [(google.api.field_behavior) = REQUIRED];
}

message GetBorrowingRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string id = 2 [(google.api.field_behavior) = REQUIRED];
}

message ListBorrowingsRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  optional BorrowingStatus status = 2;
  optional BorrowingDirection direction = 3;
  int32 page_size = 4;
  string page_token = 5;
}

message ListBorrowingsResponse {
  repeated Borrowing borrowings = 1;
  string next_page_token = 2;
}

message UpdateBorrowingRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string id = 2 [(google.api.field_behavior) = REQUIRED];
  BorrowingInput borrowing = 3 [(google.api.field_behavior) = REQUIRED];
}

message DeleteBorrowingRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string id = 2 [(google.api.field_behavior) = REQUIRED];
}

message BorrowingRepaymentInput {
  int64 amount = 1 [(google.api.field_behavior) = REQUIRED];
  google.protobuf.Timestamp payment_date = 2 [(google.api.field_behavior) = REQUIRED];
  string notes = 3;
}

message CreateBorrowingRepaymentRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string borrowing_id = 2 [(google.api.field_behavior) = REQUIRED];
  BorrowingRepaymentInput repayment = 3 [(google.api.field_behavior) = REQUIRED];
}

message ListBorrowingRepaymentsRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string borrowing_id = 2 [(google.api.field_behavior) = REQUIRED];
}

message ListBorrowingRepaymentsResponse {
  repeated BorrowingRepayment repayments = 1;
}

message DeleteBorrowingRepaymentRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
  string borrowing_id = 2 [(google.api.field_behavior) = REQUIRED];
  string id = 3 [(google.api.field_behavior) = REQUIRED];
}

message CurrencyInfo {
  string code = 1;
  string name = 2;
}

message ListCurrenciesRequest {
  string space_id = 1 [(google.api.field_behavior) = REQUIRED];
}

message ListCurrenciesResponse {
  repeated CurrencyInfo currencies = 1;
}
