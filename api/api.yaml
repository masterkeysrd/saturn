# Global API configuration — shared security definitions and default auth rules.
#
# This file lives at the api/ root and provides:
#   - securityDefinitions (JWT Bearer scheme)
#   - default authentication rules (applied to all modules)

name: saturn
title: "Saturn API"
documentation:
  summary: "Your personal productivity suite — organized by space."

securityDefinitions:
  bearerAuth:
    type: "apiKey"
    in: "header"
    name: "Authorization"
    description: "Enter your JWT token: Bearer <token>"

authentication:
  rules:
    # Default fallback: require authentication for everything
    - selector: "*"
      auth_required: true
